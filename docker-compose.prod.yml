networks:
  kesimarket-net:
    external: true

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  typesense_data:
    driver: local
  app_uploads:
    driver: local

# ---------------------------------------------------------------------------
# Anchors — shared hardening defaults
# ---------------------------------------------------------------------------
x-hardening: &hardening
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  db:
    <<: *hardening
    image: postgres:16-alpine
    container_name: kesimarket-postgres-prod
    mem_limit: 1g
    mem_reservation: 256m
    pids_limit: 200
    cpus: 1.0
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_READ_SEARCH
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    # Internal only — backend connects via the docker network as `db:5432`.
    # Uncomment to access from the host (bind localhost only).
    # ports:
    #   - '127.0.0.1:5432:5432'
    networks:
      - kesimarket-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # MinIO Object Storage
  # ==========================================================================
  minio:
    <<: *hardening
    image: minio/minio:latest
    container_name: kesimarket-minio-prod
    mem_limit: 512m
    mem_reservation: 128m
    pids_limit: 200
    cpus: 1.0
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    ports:
      # Bind 127.0.0.1 — Caddy/Nginx on the host handles TLS for storage.kesimarket.com
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    networks:
      - kesimarket-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    <<: *hardening
    image: redis:7-alpine
    container_name: kesimarket-redis-prod
    mem_limit: 256m
    mem_reservation: 64m
    pids_limit: 100
    cpus: 0.5
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # Internal only — no host binding
    networks:
      - kesimarket-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # Typesense Search Engine
  # ==========================================================================
  typesense:
    <<: *hardening
    image: typesense/typesense:27.0
    container_name: kesimarket-typesense-prod
    mem_limit: 512m
    mem_reservation: 128m
    pids_limit: 200
    cpus: 1.0
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?TYPESENSE_API_KEY is required}
      TYPESENSE_ENABLE_CORS: 'true'
    volumes:
      - typesense_data:/data
    ports:
      - '127.0.0.1:8108:8108'
    networks:
      - kesimarket-net

  # ==========================================================================
  # Application Backend (AdonisJS + Puppeteer)
  # ==========================================================================
  app:
    <<: *hardening
    image: kesimarket-backend-prod:latest
    container_name: kesimarket-backend-prod

    # --- Resource limits ---
    # Heap Node = 512 MB ; +Chromium (~300-500 MB par instance) ; marge buffers/uploads
    mem_limit: 1536m
    mem_reservation: 512m
    # Chromium fork beaucoup (renderer, GPU, network process) — 500 plutôt que 200
    pids_limit: 500
    cpus: 1.5

    # --- Hardening ---
    # Rootfs read-only ; Chromium et Adonis n'écrivent que dans /tmp et /app/uploads
    read_only: true
    # Chromium a besoin d'exécuter des binaires depuis /tmp (zygote, sandbox bypass)
    # → on garde tmpfs /tmp EXÉCUTABLE mais nosuid,nodev. Toujours mieux qu'un rootfs RW.
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
      - /dev/shm:rw,nosuid,nodev,size=256m
      - /app/tmp:rw,nosuid,nodev,size=128m

    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_started

    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY:?APP_KEY is required}

      # Limite la heap V8
      NODE_OPTIONS: --max-old-space-size=512

      # Database
      DB_CONNECTION: pg
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}

      # MinIO
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: 'false'
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:?MINIO_PUBLIC_ENDPOINT is required}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Typesense
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}

      # Auth & Security
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS}

      # Email
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      MAIL_USERNAME: ${MAIL_USERNAME}
      GOOGLE_APP_SECRET: ${GOOGLE_APP_SECRET}

      # Frontend
      FRONTEND_URL: ${FRONTEND_URL}

      # Storage
      STORAGE_DRIVER: minio

      # Puppeteer
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

    volumes:
      - app_uploads:/app/uploads

    ports:
      # Bind 127.0.0.1 — Caddy/Nginx on the host handles TLS for api.kesimarket.com
      - '127.0.0.1:3333:3333'

    networks:
      - kesimarket-net
